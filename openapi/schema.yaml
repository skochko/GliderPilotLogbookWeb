                $ref: '#/components/schemas/ApiError'
          description: Validation error
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Not authenticated
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Rate limit exceeded
        '502':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Google API error
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Resource not found
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
          description: Conflict
components:
  schemas:
    ApiError:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ApiErrorBody'
      required:
      - error
    ApiErrorBody:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details: {}
      required:
      - code
      - details
      - message
    CsrfResponse:
      type: object
      properties:
        csrfToken:
          type: string
      required:
      - csrfToken
    Flight:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        row_number:
          type: integer
          readOnly: true
        date:
          type: string
        pilot:
          type: string
        copilot:
          type: string
        glider:
          type: string
        registration:
          type: string
        departure_place:
          type: string
        launch_time:
          type: string
        arrival_place:
          type: string
        landing_time:
          type: string
        flight_time:
          type: string
          readOnly: true
        launch_type:
          type: string
        landings:
          type: integer
        is_instructor:
          type: boolean
        pic_time:
          type: string
          readOnly: true
        dual_time:
          type: string
          readOnly: true
        instructor_time:
          type: string
          readOnly: true
        remarks:
          type: string
      required:
      - arrival_place
      - copilot
      - date
      - departure_place
      - dual_time
      - flight_time
      - glider
      - id
      - instructor_time
      - is_instructor
      - landing_time
      - landings
      - launch_time
      - launch_type
      - pic_time
      - pilot
      - registration
      - remarks
      - row_number
    FlightCreateRequest:
      type: object
      properties:
        date:
          type: string
          minLength: 1
        pilot:
          type: string
          default: ''
        copilot:
          type: string
          default: ''
        glider:
          type: string
          default: ''
        registration:
          type: string
          default: ''
        departure_place:
          type: string
          default: ''
        launch_time:
          type: string
          default: ''
        arrival_place:
          type: string
          default: ''
        landing_time:
          type: string
          default: ''
        launch_type:
          type: string
          default: ''
        landings:
          type: integer
          default: 0
        is_instructor:
          type: boolean
          default: false
        remarks:
          type: string
          default: ''
      required:
      - date
    GliderStats:
      type: object
      properties:
        glider:
          type: string
        count:
          type: integer
        hours:
          type: number
          format: double
      required:
      - count
      - glider
      - hours
    MonthStats:
      type: object
      properties:
        month:
          type: string
          pattern: ^\d{4}-\d{2}$
        count:
          type: integer
        hours:
          type: number
          format: double
      required:
      - count
      - hours
      - month
    GoogleAccessToken:
      type: object
      properties:
        accessToken:
          type: string
      required:
      - accessToken
    GoogleCallbackRequest:
      type: object
      properties:
        code:
          type: string
          minLength: 1
        state:
          type: string
      required:
      - code
    HealthChecks:
      type: object
      properties:
        database:
          type: boolean
        redis:
          type: boolean
      required:
      - database
      - redis
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        checks:
          $ref: '#/components/schemas/HealthChecks'
      required:
      - checks
      - status
    LaunchTypeStats:
      type: object
      properties:
        launch_type:
          type: string
        count:
          type: integer
      required:
      - count
      - launch_type
    LogbookConnectRequest:
      type: object
      properties:
        spreadsheet_id:
          type: string
        url:
          type: string
    LogbookStatus:
      type: object
      properties:
        connected:
          type: boolean
        spreadsheet_id:
          type: string
        title:
          type: string
        sheets:
          type: array
          items:
            type: string
      required:
      - connected
      - sheets
      - spreadsheet_id
      - title
    MedicalBlock:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/MedicalEntry'
