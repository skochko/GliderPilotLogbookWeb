          type: string
        medical_type:
          type: string
          maxLength: 255
        expiry_date:
          type: string
      required:
      - expiry_date
      - medical_type
      - start_date
    MedicalEntryRequest:
      type: object
      properties:
        start_date:
          type: string
        medical_type:
          type: string
          maxLength: 255
        expiry_date:
          type: string
      required:
      - expiry_date
      - medical_type
      - start_date
    Page:
