        * `about` - About
        * `contact` - Contact
        * `privacy` - Privacy Policy
        * `terms` - Terms of Service
        * `cookies` - Cookie Policy
        * `disclaimer` - Disclaimer
        * `faq` - FAQ
    PatchedFlightPatchRequest:
      type: object
      properties:
        date:
          type: string
          minLength: 1
        pilot:
          type: string
        copilot:
          type: string
        glider:
          type: string
        registration:
          type: string
        departure_place:
          type: string
        launch_time:
          type: string
        arrival_place:
          type: string
        landing_time:
          type: string
        launch_type:
          type: string
        landings:
          type: integer
        is_instructor:
          type: boolean
        remarks:
          type: string
