          type: string
        fi_3year_date:
          type: string
        fi_ref_date:
          type: string
    Profile:
      type: object
      properties:
        email:
          type: string
          format: email
        google_sub:
          type: string
        has_logbook:
          type: boolean
        spreadsheet_id:
          type: string
        preferences:
          type: object
          additionalProperties: {}
      required:
      - email
      - google_sub
      - has_logbook
      - preferences
      - spreadsheet_id
    RecentActivity:
      type: object
      properties:
