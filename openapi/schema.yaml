components:
  schemas:
    ApiError:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ApiErrorBody'
      required:
      - error
    ApiErrorBody:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details: {}
      required:
      - code
      - details
      - message
    CsrfResponse:
      type: object
      properties:
        csrfToken:
          type: string
      required:
      - csrfToken
    Flight:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        row_number:
          type: integer
          readOnly: true
        date:
          type: string
        pilot:
          type: string
        copilot:
          type: string
        glider:
          type: string
        registration:
          type: string
        departure_place:
          type: string
        launch_time:
          type: string
        arrival_place:
          type: string
        landing_time:
          type: string
        flight_time:
          type: string
          readOnly: true
        launch_type:
          type: string
        landings:
          type: integer
        is_instructor:
          type: boolean
        pic_time:
          type: string
          readOnly: true
        dual_time:
          type: string
          readOnly: true
        instructor_time:
          type: string
          readOnly: true
        remarks:
          type: string
      required:
      - arrival_place
      - copilot
      - date
      - departure_place
      - dual_time
      - flight_time
