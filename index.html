  <body>
    <noscript>
      <h1>Glider Pilot Logbook</h1>
      <p>
        Glider Pilot Logbook is a web application for glider pilots in the United Kingdom. It helps
        you view, add, and edit flight records in your own Google Spreadsheet logbook, check
        dashboard totals and legality, and optionally sync missing flights from a participating
        club with your consent. Sign in with Google to connect the app to your spreadsheet; your
        Google Sheet remains the official record in your Google Drive.
